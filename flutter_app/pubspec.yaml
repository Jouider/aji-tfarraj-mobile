name: aji_tfarraj
description: Aji Tfarraj Mobile App - TV Show Reservation System
publish_to: 'none'
version: 1.0.9+30

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  cupertino_icons: ^1.0.6
  # API & Networking
  dio: ^5.4.0
  # Error monitoring & performance (iOS + Android)
  sentry_flutter: ^8.9.0
  # Secure token storage
  flutter_secure_storage: ^9.0.0
  # Image caching
  cached_network_image: ^3.3.1
  # Date formatting
  intl: ^0.20.2
  # QR Code generation
  qr_flutter: ^4.1.0
  # Typography - Inter (FR) & Cairo (AR)
  google_fonts: ^6.1.0
  url_launcher: ^6.3.2
  # Local caching
  shared_preferences: ^2.2.2
  # Firebase & Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0
  # Analytics
  firebase_analytics: ^11.3.3
  image_picker: ^1.2.1
  # Social authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  # QR code scanning (staff check-in)
  mobile_scanner: ^7.0.0

  # Deep linking & Sharing
  app_links: ^6.1.0
  share_plus: ^10.0.0

  flutter_native_splash:
    ^2.4.0
  video_player: ^2.11.1
  chewie: ^1.13.0
  path_provider: ^2.1.5
  flutter_web_auth_2: ^5.0.1
  # App version gate (compare installed vs backend latest/min)
  package_info_plus: ^8.0.0
  # Biometric unlock (Face ID / Touch ID / fingerprint)
  local_auth: ^2.3.0
  # Deferred deep-link attribution (CP referral): Android Play Install Referrer.
  # iOS uses the clipboard (flutter/services) — no plugin needed there.
  android_play_install_referrer: ^0.4.0
  # Open the OS app-settings page (deep-link users to enable camera/photos when
  # a permission was previously denied). Lightweight, no iOS Podfile macros.
  app_settings: ^5.1.1

# Force the pre-Credential-Manager google_sign_in_android.
# 6.2.x migrated to androidx.credentials.CredentialManager, which hangs
# forever on many devices (Xiaomi/Redmi/Samsung) when the Play Services
# version, device-locale, or multi-account state is imperfect. 6.1.36 is
# the last version using the classic GoogleSignInClient activity flow,
# which is far more reliable in production.
dependency_overrides:
  google_sign_in_android: 6.1.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/web-app-manifest-512x512.png"
  min_sdk_android: 21
  remove_alpha_channel: true
  background_color: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/ajitfarraj_logo/

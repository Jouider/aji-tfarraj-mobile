name: aji_tfarraj
description: Aji Tfarraj Mobile App - TV Show Reservation System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  cupertino_icons: ^1.0.6
  # API & Networking
  dio: ^5.4.0
  # Secure token storage
  flutter_secure_storage: ^9.0.0
  # Image caching
  cached_network_image: ^3.3.1
  # Date formatting
  intl: ^0.20.2
  # QR Code generation
  qr_flutter: ^4.1.0
  # Typography - Inter (FR) & Cairo (AR)
  google_fonts: ^6.1.0
  url_launcher: ^6.3.2
  # Local caching
  shared_preferences: ^2.2.2
  # Firebase & Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0
  # Analytics
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
